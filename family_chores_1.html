<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#eeede9;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --radius:12px;--radius-sm:8px;
  --grace-bg:#EAF3DE;--grace-text:#3B6D11;--grace-acc:#639922;
  --maddie-bg:#E6F1FB;--maddie-text:#185FA5;--maddie-acc:#378ADD;
  --emily-bg:#FAEEDA;--emily-text:#854F0B;--emily-acc:#EF9F27;
  --caleb-bg:#EEEDFE;--caleb-text:#3C3489;--caleb-acc:#7F77DD;
  --stacey-bg:#FBEAF0;--stacey-text:#72243E;--stacey-acc:#D4537E;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#f0efe9;--text2:#b4b2a9;--text3:#888780;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --grace-bg:#1a2e0f;--grace-text:#97C459;--grace-acc:#639922;
    --maddie-bg:#0d2240;--maddie-text:#85B7EB;--maddie-acc:#378ADD;
    --emily-bg:#2e1f06;--emily-text:#FAC775;--emily-acc:#EF9F27;
    --caleb-bg:#1a1840;--caleb-text:#AFA9EC;--caleb-acc:#7F77DD;
    --stacey-bg:#2a0f1a;--stacey-text:#ED93B1;--stacey-acc:#D4537E;
  }
}
html,body{height:100%;background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
.shell{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);box-shadow:0 0 0 0.5px var(--border)}
.app-header{padding:env(safe-area-inset-top,12px) 1.25rem 0.75rem;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.app-header h1{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}
.tabs{display:flex;gap:6px;padding:0.75rem 1.25rem;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 18px;border-radius:999px;border:1.5px solid var(--border2);font-size:14px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--text2);transition:background .15s,color .15s,border-color .15s}
.tab[data-p="Grace"].active {background:var(--grace-bg);color:var(--grace-text);border-color:var(--grace-acc)}
.tab[data-p="Maddie"].active{background:var(--maddie-bg);color:var(--maddie-text);border-color:var(--maddie-acc)}
.tab[data-p="Emily"].active {background:var(--emily-bg);color:var(--emily-text);border-color:var(--emily-acc)}
.tab[data-p="Caleb"].active {background:var(--caleb-bg);color:var(--caleb-text);border-color:var(--caleb-acc)}
.tab[data-p="Stacey"].active{background:var(--stacey-bg);color:var(--stacey-text);border-color:var(--stacey-acc)}
.day-nav{display:flex;align-items:center;padding:0.6rem 0.75rem;border-bottom:0.5px solid var(--border);background:var(--bg)}
.nav-arrow{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:background .12s}
.nav-arrow:active{background:var(--bg2)}
.day-strip{flex:1;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:0 8px}
.day-strip::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 10px;border-radius:var(--radius-sm);border:0.5px solid transparent;cursor:pointer;transition:background .12s,border-color .12s;min-width:44px}
.day-pill:active{background:var(--bg2)}
.day-pill .pill-dow{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em}
.day-pill .pill-date{font-size:14px;font-weight:500;color:var(--text2)}
.day-pill.today .pill-date{color:var(--text)}
.day-pill.today .pill-dow{color:var(--text2)}
.day-pill.selected{border-color:var(--acc,var(--border2));background:var(--acc-bg,var(--bg2))}
.day-pill.selected .pill-date{color:var(--acc-text,var(--text));font-weight:600}
.day-pill.selected .pill-dow{color:var(--acc-text,var(--text2))}
.dot-row{display:flex;gap:2px;justify-content:center;margin-top:2px;min-height:5px}
.dot{width:4px;height:4px;border-radius:50%}
.progress-wrap{padding:0.75rem 1.25rem 0.5rem}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-label{font-size:13px;color:var(--text2)}
.progress-count{font-size:13px;font-weight:500;color:var(--text)}
.progress-track{height:6px;background:var(--bg3);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;border-radius:999px;transition:width .35s ease;width:0%}
.fill-Grace {background:var(--grace-acc)}
.fill-Maddie{background:var(--maddie-acc)}
.fill-Emily {background:var(--emily-acc)}
.fill-Caleb {background:var(--caleb-acc)}
.fill-Stacey{background:var(--stacey-acc)}
.content{flex:1;padding:0 1.25rem 2rem;overflow-y:auto}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin:1.25rem 0 0.5rem}
.chore-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border);margin-bottom:7px;background:var(--bg);cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent;user-select:none}
.chore-item:active{background:var(--bg2);transform:scale(0.99)}
.chore-item.done{opacity:.45}
.chore-item.done .chore-name{text-decoration:line-through}
.cb-ring{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cb-ring i{font-size:14px;color:#fff;display:none}
.chore-item.done .cb-ring i{display:block}
.chore-item.done .cb-ring{border-color:transparent}
.done-Grace  .cb-ring{background:var(--grace-acc)}
.done-Maddie .cb-ring{background:var(--maddie-acc)}
.done-Emily  .cb-ring{background:var(--emily-acc)}
.done-Caleb  .cb-ring{background:var(--caleb-acc)}
.done-Stacey .cb-ring{background:var(--stacey-acc)}
.chore-name{font-size:15px;color:var(--text);flex:1;line-height:1.4}
.chore-freq{font-size:12px;color:var(--text3);white-space:nowrap}
.empty-state{text-align:center;padding:4rem 1rem 2rem}
.empty-state i{font-size:40px;color:var(--text3);display:block;margin-bottom:12px}
.empty-state p{font-size:16px;color:var(--text2)}
.all-done{text-align:center;padding:3rem 1rem 2rem}
.all-done .trophy{font-size:48px;display:block;margin-bottom:12px}
.all-done h2{font-size:20px;font-weight:600;margin-bottom:6px}
.all-done p{font-size:14px;color:var(--text2)}
.future-tag{font-size:11px;background:var(--bg2);color:var(--text3);border-radius:4px;padding:2px 6px;margin-left:4px}

/* Footer with crest */
.footer{border-top:0.5px solid var(--border);background:var(--bg);padding-bottom:env(safe-area-inset-bottom,0)}
.footer-bar{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1.25rem}
.week-badge{font-size:12px;font-weight:500;padding:4px 10px;border-radius:var(--radius-sm);background:var(--bg2);color:var(--text2)}
.reset-btn{font-size:13px;color:var(--text3);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 0}
.reset-btn:active{color:var(--text2)}
.crest-footer{display:flex;flex-direction:column;align-items:center;padding:0.5rem 1rem 1rem;border-top:0.5px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.crest-mini{width:56px;height:auto;opacity:0.85;transition:opacity .15s}
.crest-footer:active .crest-mini{opacity:1}
.crest-family-name{font-size:10px;letter-spacing:2px;color:var(--text3);margin-top:4px;font-family:Georgia,serif}

/* Crest modal */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal-box{background:var(--bg);border-radius:var(--radius);max-width:360px;width:90%;padding:1.25rem;position:relative;max-height:90dvh;overflow-y:auto}
.modal-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2)}
.modal-crest{width:100%;max-width:280px;display:block;margin:0 auto}
</style>
</head>

<script>
const DAYS  =["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DOWS  =["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const TODAY =new Date();TODAY.setHours(0,0,0,0);
let viewDate=new Date(TODAY),currentPerson="Grace";
function dateKey(d){return`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`}
function loadDone(p,d){try{return JSON.parse(localStorage.getItem(`fc_${p}_${dateKey(d)}`)||"[]")}catch{return[]}}
function saveDone(p,d,a){try{localStorage.setItem(`fc_${p}_${dateKey(d)}`,JSON.stringify(a))}catch{}}
function getRotation(d){const j=new Date(2026,0,5);const w=Math.floor((d-j)/(7*86400000));return["A","B","C"][((w%3)+3)%3]}
function uid(n){return btoa(encodeURIComponent(n)).replace(/=/g,"")}
const deepClean={A:"Grace",B:"Maddie",C:"Emily"};
const mopPerson={A:"Grace",B:"Maddie",C:"Emily"};
function buildChores(person,date){

  const on=days=>days.includes(D);

        on(["Wednesday"])&&{name:"Wash kitchen towels & linens",freq:"weekly"},

        on(["Monday","Friday"])&&{name:"Hand-wash pots & pans",freq:"today"},
      ]},
      {section:"Cleaning",items:[
        (R==="C"&&on(["Tuesday","Thursday","Saturday"]))&&{name:"Sweep common areas",freq:"your week"},
        (dc==="Grace"&&on(["Saturday"]))&&{name:"Deep clean bathroom",freq:"your week"},
        (mp==="Grace"&&on(["Saturday"]))&&{name:"Mop floors",freq:"your week"},
        on(["Saturday"])&&{name:"Wipe light switches & doorknobs",freq:"weekly"},
        on(["Saturday"])&&{name:"Clean Livie's area & bed",freq:"weekly"},
      ]},
      {section:"Trash & recycling",items:[
        on(["Tuesday"])&&{name:"Empty indoor trash cans",freq:"today"},
        on(["Wednesday"])&&{name:"Put recycling out",freq:"weekly"},
      ]},
      {section:"Personal",items:[
        on(["Monday"])&&{name:"Personal laundry (wash, dry, put away)",freq:"weekly"},
        {name:"Make bed",freq:"daily"},
      ]},
    ],
    Maddie:[
      {section:"Kitchen",items:[
        R==="B"&&{name:"Unload dishwasher",freq:"your week"},
        R==="C"&&{name:"Load dishwasher / wipe sink",freq:"your week"},
        on(["Wednesday"])&&{name:"Wipe kitchen counters",freq:"today"},
        on(["Wednesday"])&&{name:"Wipe microwave inside & out",freq:"weekly"},
      ]},
      {section:"Cleaning",items:[
        (R==="A"&&on(["Tuesday","Thursday","Saturday"]))&&{name:"Sweep common areas",freq:"your week"},
        (dc==="Maddie"&&on(["Saturday"]))&&{name:"Deep clean bathroom",freq:"your week"},
        (mp==="Maddie"&&on(["Saturday"]))&&{name:"Mop floors",freq:"your week"},
        on(["Friday"])&&{name:"Vacuum living areas",freq:"weekly"},
        on(["Saturday"])&&{name:"Wipe light switches & doorknobs",freq:"weekly"},
      ]},
      {section:"Laundry",items:[on(["Saturday"])&&{name:"Fold & put away shared towels",freq:"weekly"}]},
      {section:"Trash",items:[on(["Saturday"])&&{name:"Empty indoor trash cans",freq:"today"}]},
      {section:"Personal",items:[
        on(["Tuesday"])&&{name:"Personal laundry (wash, dry, put away)",freq:"weekly"},
        {name:"Make bed",freq:"daily"},
      ]},
    ],
    Emily:[
      {section:"Pet care",items:[
        on(["Tuesday","Thursday","Saturday"])&&{name:"Feed Livie — morning",freq:"today"},
        on(["Monday","Wednesday","Friday","Sunday"])&&{name:"Feed Livie — evening",freq:"today"},
      ]},
      {section:"Kitchen",items:[
        R==="C"&&{name:"Unload dishwasher",freq:"your week"},
        R==="A"&&{name:"Load dishwasher / wipe sink",freq:"your week"},
        on(["Friday"])&&{name:"Wipe kitchen counters",freq:"today"},
        on(["Wednesday"])&&{name:"Wipe microwave inside & out",freq:"weekly"},

        (dc==="Emily"&&on(["Saturday"]))&&{name:"Deep clean bathroom",freq:"your week"},
        (mp==="Emily"&&on(["Saturday"]))&&{name:"Mop floors",freq:"your week"},
        on(["Saturday"])&&{name:"Wipe light switches & doorknobs",freq:"weekly"},

        on(["Friday"])&&{name:"Personal laundry (wash, dry, put away)",freq:"weekly"},
        {name:"Make bed",freq:"daily"},

    ],

}
const ACCENTS={
  Grace: {acc:"var(--grace-acc)",bg:"var(--grace-bg)",text:"var(--grace-text)"},
  Maddie:{acc:"var(--maddie-acc)",bg:"var(--maddie-bg)",text:"var(--maddie-text)"},
  Emily: {acc:"var(--emily-acc)",bg:"var(--emily-bg)",text:"var(--emily-text)"},
  Caleb: {acc:"var(--caleb-acc)",bg:"var(--caleb-bg)",text:"var(--caleb-text)"},
  Stacey:{acc:"var(--stacey-acc)",bg:"var(--stacey-bg)",text:"var(--stacey-text)"},
};
function dotColor(p){return{Grace:"#639922",Maddie:"#378ADD",Emily:"#EF9F27",Caleb:"#7F77DD",Stacey:"#D4537E"}[p]}
function buildStrip(){
  const strip=document.getElementById("day-strip");
  const offset=Math.round((viewDate-TODAY)/86400000);
  strip.innerHTML="";
  for(let i=offset-3;i<=offset+3;i++){
    const d=new Date(TODAY);d.setDate(TODAY.getDate()+i);
    const isToday=i===0,isSelected=dateKey(d)===dateKey(viewDate);
    const secs=buildChores(currentPerson,d);
    const total=secs.reduce((a,s)=>a+s.items.length,0);
    const done=loadDone(currentPerson,d).length;
    const allDone=total>0&&done===total,hasSome=done>0&&!allDone;
    const a=ACCENTS[currentPerson];
    const pill=document.createElement("div");
    pill.className="day-pill"+(isToday?" today":"")+(isSelected?" selected":"");
    if(isSelected){pill.style.setProperty("--acc",a.acc);pill.style.setProperty("--acc-bg",a.bg);pill.style.setProperty("--acc-text",a.text)}
    pill.innerHTML=`<span class="pill-dow">${DOWS[d.getDay()]}</span><span class="pill-date">${d.getDate()}</span><div class="dot-row">${allDone?`<div class="dot" style="background:${dotColor(currentPerson)}"></div>`:hasSome?`<div class="dot" style="background:${dotColor(currentPerson)};opacity:.4"></div>`:""}</div>`;
    pill.addEventListener("click",()=>{viewDate=d;updateAll()});
    strip.appendChild(pill);
  }
}
function shiftDay(delta){viewDate=new Date(viewDate);viewDate.setDate(viewDate.getDate()+delta);updateAll()}
function render(){
  const sections=buildChores(currentPerson,viewDate);
  const done=loadDone(currentPerson,viewDate);
  const total=sections.reduce((a,s)=>a+s.items.length,0);
  const doneCount=done.length;
  const pct=total?Math.round(doneCount/total*100):0;
  const isToday=dateKey(viewDate)===dateKey(TODAY);
  const isFuture=viewDate>TODAY;
  document.getElementById("prog-fill").className=`progress-fill fill-${currentPerson}`;
  document.getElementById("prog-fill").style.width=pct+"%";
  document.getElementById("prog-count").textContent=total?`${doneCount} / ${total}`:"";
  document.getElementById("prog-label").textContent=isToday?"Today":`${DAYS[viewDate.getDay()]}, ${MONTHS[viewDate.getMonth()]} ${viewDate.getDate()}`;
  document.getElementById("week-badge").textContent=`Week ${getRotation(viewDate)} rotation`;
  const content=document.getElementById("content");
  if(total===0){content.innerHTML=`<div class="empty-state"><i class="ti ti-sun-off" aria-hidden="true"></i><p>Nothing scheduled${isToday?" today":" this day"}!</p></div>`;return}
  if(!isFuture&&doneCount===total){content.innerHTML=`<div class="all-done"><span class="trophy">🎉</span><h2>All done, ${currentPerson}!</h2><p>${isToday?"Great work today.":"This day is complete."}</p></div>`;return}
  let html="";
  sections.forEach(({section,items})=>{
    html+=`<div class="section-label">${section}</div>`;
    items.forEach(({name,freq})=>{
      const id=uid(name),isDone=done.includes(id);
      const ft=isFuture?`<span class="future-tag">upcoming</span>`:"";
      html+=`<div class="chore-item${isDone?" done done-"+currentPerson:""}" onclick="toggle('${id}')" role="checkbox" aria-checked="${isDone}" tabindex="0"><div class="cb-ring"><i class="ti ti-check" aria-hidden="true"></i></div><span class="chore-name">${name}${ft}</span>${freq?`<span class="chore-freq">${freq}</span>`:""}</div>`;
    });
  });
  content.innerHTML=html;
}
function toggle(id){let done=loadDone(currentPerson,viewDate);done=done.includes(id)?done.filter(d=>d!==id):[...done,id];saveDone(currentPerson,viewDate,done);updateAll()}
function resetDay(){const isToday=dateKey(viewDate)===dateKey(TODAY);if(confirm(`Reset ${currentPerson}'s checklist for ${isToday?"today":DAYS[viewDate.getDay()]}?`)){saveDone(currentPerson,viewDate,[]);updateAll()}}
function updateAll(){buildStrip();render()}
document.querySelectorAll(".tab").forEach(tab=>{tab.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));tab.classList.add("active");currentPerson=tab.dataset.p;updateAll()})});
updateAll();
</script>
</body>
</html>
